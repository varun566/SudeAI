services:
  - type: web
    name: sudeai-research-agent
    runtime: python
    rootDir: openai_research_agent
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: DEMO_MODE
        value: "false"
      - key: PROVIDER
        value: gemini
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
